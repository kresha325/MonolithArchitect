<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS | Monolith Architects</title>
    <meta
      name="description"
      content="Decap CMS entry for managing Monolith Architects content."
    />
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root {
        color-scheme: light;
        --bg: #111214;
        --panel: rgba(255, 255, 255, 0.08);
        --line: rgba(255, 255, 255, 0.16);
        --text: #f4efe6;
        --muted: rgba(244, 239, 230, 0.7);
        --accent: #bea271;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at top,
            rgba(190, 162, 113, 0.18),
            transparent 32%
          ),
          linear-gradient(180deg, #171513, #0f1012);
        color: var(--text);
        font-family: "Sora", "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, 100%);
        padding: 32px;
        border: 1px solid var(--line);
        background: var(--panel);
        -webkit-backdrop-filter: blur(16px);
        backdrop-filter: blur(16px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 7vw, 2.8rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 12px 16px;
        border: 1px solid var(--accent);
        color: var(--text);
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.72rem;
      }

      .secondary {
        border-color: var(--line);
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Secure Admin Access</h1>
      <p>
        Project editing is available only through the Netlify-hosted admin with
        GitHub authentication. This local route is kept as a redirect so the CMS
        is not exposed as a misleading password-free entry point.
      </p>
      <div class="actions">
        <a
          id="secureAdminLink"
          href="https://monolitharchitect.netlify.app/admin/"
        >
          Open Secure Admin
        </a>
        <a class="secondary" href="../">Back to site</a>
      </div>
    </main>
    <noscript>
      Secure admin access requires JavaScript. Use
      https://monolitharchitect.netlify.app/admin/
    </noscript>
    <script>
      const secureAdminUrl = "https://monolitharchitect.netlify.app/admin/";

      if (window.location.href !== secureAdminUrl) {
        window.location.replace(secureAdminUrl);
      }
    </script>
  </body>
</html>
